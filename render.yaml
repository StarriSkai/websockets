# Two services: Node API + static CDN UI.
# API uses rootDir: server (backend only). Keep SKIP_CLIENT_BUILD=1 on API — Render does not expose repo files outside server/ to that service.
#
# Common deploy failures:
# - Start command "npm run start" from REPO ROOT: root package.json now runs `prestart` → `npm install --prefix server` so dotenv/express exist under server/node_modules.
# - Static: wrong publish folder → use staticPublishPath relative to REPO ROOT (./client/build).
# - Static with rootDir: only files under that folder exist at build; we build from repo root instead.
# - API: set MONGODB_URI in the dashboard (optional; app starts without DB).
# - VITE_API_BASE: set on the static service to your API URL, then redeploy static.
# - If blueprint rejects plan: free, remove the plan line or pick Starter in the dashboard.
services:
  - type: web
    name: websockets-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: SKIP_CLIENT_BUILD
        value: "1"
      - key: MONGODB_URI
        sync: false

  - type: web
    name: websockets-web
    runtime: static
    buildCommand: npm install --prefix client && npm run build --prefix client
    staticPublishPath: ./client/build
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_BASE
        sync: false
