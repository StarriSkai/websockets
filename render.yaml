# Static UI + Node API/WebSocket (two services).
# 1) Deploy API first, copy its URL (e.g. https://websockets-api.onrender.com).
# 2) On the static service, set VITE_API_BASE to that URL (no trailing slash) and redeploy.
services:
  - type: web
    name: websockets-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: SKIP_CLIENT_BUILD
        value: "1"
      - key: MONGODB_URI
        sync: false

  - type: web
    name: websockets-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: VITE_API_BASE
        sync: false
