# https://render.com/docs/blueprint-spec
# Vite outputs the React app to client/build. If you add a Render Static Site, set Publish Directory to: client/build
services:
  - type: web
    name: websockets
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:client
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
