# https://render.com/docs/blueprint-spec
# Root Directory = client (Render dashboard or rootDir below). Build/start cd to repo root so the API + monorepo install run correctly.
# Vite output: client/build. For a separate Render Static Site with root client only: Publish Directory = build
services:
  - type: web
    name: websockets
    runtime: node
    plan: free
    rootDir: client
    buildCommand: cd .. && npm install && npm run build:client
    startCommand: cd .. && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
